name: retry-tests

on:
  workflow_run:
    workflows: ["build-and-test"]
    types: [completed]

permissions:
  actions: write

jobs:
  retry-failed-jobs:
    name: retry failed jobs
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'failure' &&
        github.event.workflow_run.run_attempt < 3 &&
        !github.event.workflow_run.head_repository.fork
      }}
    runs-on: ubuntu-latest
    steps:
      - name: Show workflow_run context (safe)
        shell: bash
        run: |
          echo "Target workflow: ${{ github.event.workflow_run.name }}"
          echo "Target conclusion: ${{ github.event.workflow_run.conclusion }}"
          echo "Target run_attempt: ${{ github.event.workflow_run.run_attempt }}"
          echo "Target run_id: ${{ github.event.workflow_run.id }}"
          echo "Repo: ${{ github.repository }}"

      - name: Retry failed jobs (GitHub API)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          echo "Calling rerun-failed-jobs for run_id=${{ github.event.workflow_run.id }}"
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}/rerun-failed-jobs
