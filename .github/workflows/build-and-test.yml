name: build-and-test

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

jobs:
  thank-you-next:
    name: thank you, next
    runs-on: ubuntu-latest
    steps:
            - name: Fail first 3 attempts (demo CI retry abuse)
        shell: bash
        run: |
          echo "run_attempt = ${{ github.run_attempt }}"
          if [ "${{ github.run_attempt }}" -lt "4" ]; then
            echo "Intentionally failing attempt #${{ github.run_attempt }}"
            exit 1
          fi
          echo "Attempt >= 4 → passing (optional)"
          exit 0
